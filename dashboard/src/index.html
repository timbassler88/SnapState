<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkpoint Service — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --font-body: 'Space Grotesk', 'Segoe UI', sans-serif;
        --font-display: 'Fraunces', Georgia, serif;
        --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
      }

      body {
        font-family: var(--font-body);
        letter-spacing: -0.015em;
      }

      h1,
      h2,
      h3 {
        font-family: var(--font-display);
        letter-spacing: -0.03em;
      }

      code,
      pre,
      kbd,
      samp {
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/app.jsx"></script>
  </body>
</html>

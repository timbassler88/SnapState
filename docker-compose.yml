version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: snapstate-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: snapstate-postgres
    ports:
      - "5432:5432"
    environment:
      # NOTE: POSTGRES_DB was renamed from checkpoint_service to snapstate.
      # If you have an existing volume, drop it first: docker volume rm pg_data
      POSTGRES_DB: snapstate
      POSTGRES_USER: checkpoint
      POSTGRES_PASSWORD: checkpoint_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkpoint -d snapstate"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: snapstate-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  redis_data:
    driver: local
  pg_data:
    driver: local
